# ═══════════════════════════════════════════════════════════════════════════════════════
# Oracle WebLogic / SOA / OSB Connection Properties
#
# PATTERN DETECTION: These property keys indicate WebLogic/SOA communication
# Look for:
# - soa.*, osb.*, weblogic.* prefixes
# - URLs containing /soa-infra/, /osb/, :7001, :8001
# - t3:// protocol URLs
# ═══════════════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════════════
# SOA SUITE ENDPOINTS (SOAP Services)
# DETECTION: Property keys with "soa." prefix indicate Oracle SOA Suite
# ═══════════════════════════════════════════════════════════════════════════════════════

# Order Service - Entry point to SOA composite
# LINKING: This URL is used in @Value("${soa.order.endpoint}") in Java code
soa.order.endpoint=http://soa-server:7001/soa-infra/services/default/OrderProcessingComposite/OrderService

# Alternative WSDL endpoint (append ?wsdl to get WSDL document)
soa.order.wsdl=http://soa-server:7001/soa-infra/services/default/OrderProcessingComposite/OrderService?wsdl

# Payment Service
soa.payment.endpoint=http://soa-server:7001/soa-infra/services/default/PaymentComposite/PaymentService

# Inventory Service
soa.inventory.endpoint=http://soa-server:7001/soa-infra/services/default/InventoryComposite/InventoryService

# Shipping Service
soa.shipping.endpoint=http://soa-server:7001/soa-infra/services/default/ShippingComposite/ShippingService

# ═══════════════════════════════════════════════════════════════════════════════════════
# ORACLE SERVICE BUS (OSB) ENDPOINTS
# DETECTION: Property keys with "osb." prefix indicate Oracle Service Bus
# ═══════════════════════════════════════════════════════════════════════════════════════

# OSB HTTP Proxy for REST/JSON
osb.endpoints.order-proxy=http://osb-server:7001/osb/OrderProxy
osb.endpoints.payment-proxy=http://osb-server:7001/osb/PaymentProxy

# OSB SOAP Proxy
osb.endpoints.order-soap=http://osb-server:7001/osb/soap/OrderService

# OSB Connection timeouts
osb.connect-timeout=5000
osb.read-timeout=30000

# ═══════════════════════════════════════════════════════════════════════════════════════
# WEBLOGIC JMS CONFIGURATION
# DETECTION: Property keys with "weblogic.jms" indicate WebLogic JMS
# ═══════════════════════════════════════════════════════════════════════════════════════

# WebLogic JMS Provider URL - 100% WEBLOGIC SPECIFIC
# DETECTION: "t3://" protocol is ONLY used by WebLogic
weblogic.jms.provider-url=t3://weblogic-server:7001

# WebLogic JMS Provider URL (SSL) - 100% WEBLOGIC SPECIFIC
weblogic.jms.provider-url-ssl=t3s://weblogic-server:7002

# WebLogic Cluster URL
weblogic.jms.cluster-url=t3://server1:7001,server2:7001,server3:7001

# JNDI Factory - 100% WEBLOGIC SPECIFIC
# DETECTION: "weblogic.jndi.WLInitialContextFactory" is ONLY used by WebLogic
weblogic.jms.initial-context-factory=weblogic.jndi.WLInitialContextFactory

# JMS Connection Factory JNDI name
weblogic.jms.connection-factory=jms/OrderConnectionFactory

# Queue names (these are JNDI names, not physical queue names)
weblogic.jms.request-queue=jms/OrderRequestQueue
weblogic.jms.response-queue=jms/OrderResponseQueue
weblogic.jms.notification-queue=jms/NotificationQueue
weblogic.jms.priority-queue=jms/PriorityOrderQueue
weblogic.jms.dlq=jms/OrderDLQ

# Topic names
weblogic.jms.order-event-topic=jms/OrderEventTopic

# WebLogic JMS credentials
weblogic.jms.username=weblogic
weblogic.jms.password=welcome1

# ═══════════════════════════════════════════════════════════════════════════════════════
# KAFKA CONFIGURATION (If OSB/SOA uses Kafka)
# DETECTION: Kafka topics that OSB proxies subscribe to
# ═══════════════════════════════════════════════════════════════════════════════════════

kafka.bootstrap-servers=kafka:9092
kafka.topics.orders-inbound=orders.inbound
kafka.topics.orders-outbound=orders.outbound
kafka.topics.orders-dlq=orders.dlq
kafka.consumer-group=order-consumers

# ═══════════════════════════════════════════════════════════════════════════════════════
# SPRING JMS CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════════════

spring.jms.listener.auto-startup=true
spring.jms.listener.concurrency=1
spring.jms.listener.max-concurrency=5

# ═══════════════════════════════════════════════════════════════════════════════════════
# SOAP WEB SERVICE CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════════════

# WebServiceTemplate default URI
soap.default-uri=http://soa-server:7001/soa-infra/services/default/OrderProcessingComposite/OrderService

# Timeouts for SOAP calls
soap.connect-timeout=30000
soap.request-timeout=120000

# ═══════════════════════════════════════════════════════════════════════════════════════
# WEBLOGIC SERVER ADMIN (For deployment/management)
# ═══════════════════════════════════════════════════════════════════════════════════════

weblogic.admin.host=weblogic-admin:7001
weblogic.admin.username=weblogic
weblogic.admin.password=welcome1
